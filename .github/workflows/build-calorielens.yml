name: Build CalorieLens

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/build-calorielens.yml"
      - "calorie-tracker-android/**"
      - "calorielens-sync-backend/**"
  pull_request:
    paths:
      - ".github/workflows/build-calorielens.yml"
      - "calorie-tracker-android/**"
      - "calorielens-sync-backend/**"

jobs:
  backend-smoke:
    name: Backend Smoke Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: calorielens-sync-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start Backend
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8000 > backend.log 2>&1 &
          echo $! > backend.pid
          sleep 5

      - name: Health Check
        run: |
          curl --fail http://127.0.0.1:8000/health

      - name: Stop Backend
        if: always()
        run: |
          if [ -f backend.pid ]; then
            kill "$(cat backend.pid)" || true
          fi

  backend-docker:
    name: Backend Docker Build
    runs-on: ubuntu-latest
    needs: backend-smoke
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t calorielens-sync-backend:ci ./calorielens-sync-backend

  android-build:
    name: Android Build
    runs-on: ubuntu-latest
    needs: backend-smoke
    defaults:
      run:
        working-directory: calorie-tracker-android
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK Packages
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager "platforms;android-36" "build-tools;36.1.0"

      - name: Make Gradle Wrapper Executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Restore Android Signing Files
        if: ${{ secrets.CALORIELENS_KEYSTORE_BASE64 != '' && secrets.CALORIELENS_STORE_PASSWORD != '' && secrets.CALORIELENS_KEY_ALIAS != '' && secrets.CALORIELENS_KEY_PASSWORD != '' }}
        run: |
          mkdir -p signing
          echo "${{ secrets.CALORIELENS_KEYSTORE_BASE64 }}" | base64 --decode > signing/calorielens-release.jks
          cat > keystore.properties <<EOF
          storeFile=signing/calorielens-release.jks
          storePassword=${{ secrets.CALORIELENS_STORE_PASSWORD }}
          keyAlias=${{ secrets.CALORIELENS_KEY_ALIAS }}
          keyPassword=${{ secrets.CALORIELENS_KEY_PASSWORD }}
          EOF

      - name: Build Signed Release APK
        if: ${{ secrets.CALORIELENS_KEYSTORE_BASE64 != '' && secrets.CALORIELENS_STORE_PASSWORD != '' && secrets.CALORIELENS_KEY_ALIAS != '' && secrets.CALORIELENS_KEY_PASSWORD != '' }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: calorielens-debug-apk
          path: calorie-tracker-android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        if: ${{ secrets.CALORIELENS_KEYSTORE_BASE64 != '' && secrets.CALORIELENS_STORE_PASSWORD != '' && secrets.CALORIELENS_KEY_ALIAS != '' && secrets.CALORIELENS_KEY_PASSWORD != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: calorielens-release-apk
          path: calorie-tracker-android/app/build/outputs/apk/release/app-release.apk
