name: Build Fitness Platform

on:
  workflow_dispatch:
  push:
    paths:
      - "fitness-platform/**"
      - ".github/workflows/build-fitness-platform.yml"
  pull_request:
    paths:
      - "fitness-platform/**"
      - ".github/workflows/build-fitness-platform.yml"

permissions:
  contents: read

jobs:
  web-build:
    name: Web Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fitness-platform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: fitness-platform/package-lock.json

      - name: Install web dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: fitness-platform-web-dist
          path: fitness-platform/dist
          if-no-files-found: error
          retention-days: 14

  android-build:
    name: Android Debug APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fitness-platform/android-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager "platforms;android-36" "build-tools;36.1.0"

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew --no-daemon assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: fitness-platform-android-debug-apk
          path: |
            fitness-platform/android-app/app/build/outputs/apk/debug/app-debug.apk
            fitness-platform/android-app/app/build/outputs/apk/debug/output-metadata.json
          if-no-files-found: error
          retention-days: 14
