services:
  backend:
    build: .
    container_name: calorielens-sync-backend
    ports:
      - "8000:8000"
    environment:
      APP_ENV: ${APP_ENV:-development}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8000}
      REQUIRE_VERIFIED_EMAIL: ${REQUIRE_VERIFIED_EMAIL:-false}
      ACCESS_TOKEN_TTL_SECONDS: ${ACCESS_TOKEN_TTL_SECONDS:-3600}
      REFRESH_TOKEN_TTL_SECONDS: ${REFRESH_TOKEN_TTL_SECONDS:-2592000}
      EMAIL_TOKEN_TTL_SECONDS: ${EMAIL_TOKEN_TTL_SECONDS:-86400}
      PASSWORD_RESET_TOKEN_TTL_SECONDS: ${PASSWORD_RESET_TOKEN_TTL_SECONDS:-1800}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-no-reply@calorielens.local}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
